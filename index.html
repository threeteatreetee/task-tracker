// persisted blob = { sites, people }. people = global roster (kept even when a site/work is gone).
function derivePeople(sites){
  const set=new Set();
  (sites||[]).forEach(s=>{
    (s.members||[]).forEach(m=>m&&set.add(m));
    (s.tasks||[]).forEach(t=>t.subtasks.forEach(st=>(st.members||[]).forEach(m=>{ if(m&&m!=='ไม่ระบุ') set.add(m); })));
    (s.materials||[]).forEach(mt=>(mt.members||[]).forEach(m=>{ if(m&&m!=='ไม่ระบุ') set.add(m); }));
  });
  return [...set];
}
function applyData(d){  // accepts new shape {sites,people} or legacy bare sites array
  if(Array.isArray(d)){ state.sites=d; state.people=derivePeople(d); }
  else if(d && typeof d==='object'){ state.sites=d.sites||[]; state.people=Array.isArray(d.people)?d.people:derivePeople(state.sites); }
}
function snapshot(){ return { sites: state.sites, people: state.people }; }
function loadInitial(){
  const saved = localStorage.getItem(LS_KEY);
  if (saved) { try { applyData(JSON.parse(saved)); return; } catch(e) {} }
  state.sites = JSON.parse(JSON.stringify(seedSites)); state.people = derivePeople(state.sites);
}
function save() {
  localStorage.setItem(LS_KEY, JSON.stringify(snapshot()));   // local cache / offline copy
  if (CLOUD) pushCloud();                                       // fire-and-forget upsert
}

// ── cloud (single JSON row, last-write-wins) ──
// ponytail: one row holds the whole sites blob, RLS = authenticated-only. Split into per-row tables only if concurrent edits start clobbering each other.
let sb = CLOUD ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
let pushing = false, session = null, cloudReady = false;
const CLOUD_ROW = 'shared';
async function pushCloud() {
  // guard: never overwrite the cloud until we've successfully read it once this session.
  // stops a load failure (or stale local/seed data) from clobbering everyone's real data.
  if (!sb || pushing || !cloudReady) return;
  pushing = true;
  const { error } = await sb.from('app_state').upsert({ id: CLOUD_ROW, data: snapshot() });
  pushing = false;
  if (error) console.warn('cloud save failed:', error.message);
}
async function loadCloud() {
  const { data, error } = await sb.from('app_state').select('data').eq('id', CLOUD_ROW).maybeSingle();
  if (error) { console.warn('cloud load failed — edits will NOT sync until reload (cloud data protected):', error.message); return; }
  cloudReady = true;   // read succeeded → safe to write from now on
  if (data && data.data) { applyData(data.data); render(); }
  else { await pushCloud(); }   // first run: seed the row from current local data
  sb.channel('app_state')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state', filter: `id=eq.${CLOUD_ROW}` },
        payload => { if (!pushing && payload.new && payload.new.data) { applyData(payload.new.data); render(); } })
    .subscribe();
}

// ── login gate (email + password; one shared account) ──
let loginBusy = false, loginErr = '';
async function doLogin(email, password) {
  if (!email || !password) { loginErr = 'กรอกอีเมลและรหัสผ่าน'; return renderLogin(); }
  loginErr = ''; loginBusy = true; renderLogin();
  const { error } = await sb.auth.signInWithPassword({ email, password });
  loginBusy = false;
  if (error) { loginErr = 'เข้าสู่ระบบไม่สำเร็จ — เช็คอีเมล/รหัสผ่าน'; renderLogin(); }
  // success → onAuthStateChange fires and shows the app
}

  const go = () => doLogin(document.getElementById('login-email').value.trim(), document.getElementById('login-pw').value);

}

async function boot() {
  if (!CLOUD) { render(); return; }   // local-only mode (no creds)
  sb.auth.onAuthStateChange((_e, s) => {
    const was = !!session; session = s;
    if (s && !was) { render(); loadCloud(); }   // just logged in
    else if (!s && was) { renderLogin(); }       // logged out / expired
  });
  const { data } = await sb.auth.getSession();
  session = data.session;
  if (session) { render(); loadCloud(); } else { renderLogin(); }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().split('T')[0];

  page:'dashboard', filter:'pending', filterMenuOpen:false,

  modal:null, fabOpen:false, validationMsg:'',
  form:{ name:'', deadline:today(), siteId:'', taskId:'', memberIds:[], newTaskName:'', taskPickerOpen:false, editId:'', qty:'', unit:'', newSiteName:'', newPersonName:'' },

};

// ── escaping ──
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ── date helpers ──
function fmtDate(ts){ const d=new Date(ts); return `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear()+543-2500}`; }
function fmtDeadline(d){
  if(!d) return { label:'ไม่ระบุ', u:'normal' };
  const date=new Date(d+'T00:00:00'); const now=new Date(); now.setHours(0,0,0,0);
  const diff=Math.round((date-now)/86400000);
  const lbl=`${date.getDate()} ${thaiMonths[date.getMonth()]}`;
  if(diff<0)  return { label:`เลย ${-diff} วัน`, u:'overdue' };
  if(diff===0)return { label:'วันนี้!', u:'overdue' };
  if(diff<=7) return { label:`${lbl} (อีก ${diff} วัน)`, u:'urgent' };
  return { label:lbl, u:'normal' };
}
const uColor = u => u==='overdue'?'#dc2626' : u==='urgent'?'#d97706' : '#6b7280';
function hexToRgba(hex, a){ const h=(hex||'#2563eb').replace('#',''); const f=h.length===3?h.split('').map(c=>c+c).join(''):h; const n=parseInt(f,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

// ── mutations ──
function markDone(id){ const now=Date.now(); state.sites.forEach(s=>s.tasks.forEach(t=>t.subtasks.forEach(st=>{ if(st.id===id){st.done=true;st.doneAt=now;} }))); save(); render(); }
function undoDone(id){ state.sites.forEach(s=>s.tasks.forEach(t=>t.subtasks.forEach(st=>{ if(st.id===id){st.done=false;st.doneAt=null;} }))); save(); render(); }
function deleteSubtask(id){ state.sites.forEach(s=>s.tasks.forEach(t=>t.subtasks=t.subtasks.filter(st=>st.id!==id))); state.modal=null; save(); render(); }
function deleteMember(siteId,name){ const s=state.sites.find(x=>x.id===siteId); if(s) s.members=s.members.filter(m=>m!==name); save(); render(); }
function deleteSite(siteId){
  const site=state.sites.find(x=>x.id===siteId);
  const pending=site?site.tasks.reduce((a,t)=>a+t.subtasks.filter(st=>!st.done).length,0):0;
  if(pending>0) return; // guard: only delete fully-done sites
  state.sites=state.sites.filter(x=>x.id!==siteId); state.modal=null; save(); render();
}
function openEditSite(id){
  const site=state.sites.find(x=>x.id===id); if(!site) return;
  state.modal='editSite'; state.fabOpen=false; state.validationMsg='';
  state.form={ name:site.name, deadline:today(), siteId:site.id, taskId:'', memberIds:[], newTaskName:'', taskPickerOpen:false, editId:id, qty:'', unit:'', newSiteName:'', newPersonName:'', color:site.color };
  render();
}

function openModal(type, ctx={}){
  state.modal=type; state.fabOpen=false; state.validationMsg='';
  state.form={ name:'', deadline:today(), siteId:ctx.siteId||(state.sites[0]&&state.sites[0].id)||'', taskId:ctx.taskId||'', memberIds:[], newTaskName:'', taskPickerOpen:false, editId:'', qty:'', unit:'', newSiteName:'', newPersonName:'' };
  render();
}
function openEditTask(id){
  for(const site of state.sites) for(const task of site.tasks) for(const st of task.subtasks){
    if(st.id===id){
      state.modal='editTask'; state.fabOpen=false; state.validationMsg='';
      state.form={ name:st.name, deadline:st.deadline, siteId:site.id, taskId:task.id, memberIds:[...st.members], newTaskName:'', taskPickerOpen:false, editId:id, qty:'', unit:'', newSiteName:'', newPersonName:'' };
      render(); return;
    }
  }
}
function openEditMaterial(id){
  for(const site of state.sites) for(const mat of (site.materials||[])){
    if(mat.id===id){
      state.modal='editMaterial'; state.fabOpen=false; state.validationMsg='';
      state.form={ name:mat.name, deadline:mat.deadline, siteId:site.id, taskId:'', memberIds:[...(mat.members||[])], newTaskName:'', taskPickerOpen:false, editId:id, qty:mat.qty||'', unit:mat.unit||'', newSiteName:'', newPersonName:'' };
      render(); return;
    }
  }
}
function markReceived(id){ const now=Date.now(); state.sites.forEach(s=>(s.materials||[]).forEach(m=>{ if(m.id===id){m.received=true;m.receivedAt=now;} })); save(); render(); }
function deleteMaterial(id){ state.sites.forEach(s=>{ if(s.materials) s.materials=s.materials.filter(m=>m.id!==id); }); state.modal=null; save(); render(); }
function deleteGroup(siteId, taskId){
  const s=state.sites.find(x=>x.id===siteId); if(!s) return;
  const t=s.tasks.find(x=>x.id===taskId); if(!t) return;
  if(t.subtasks.some(st=>!st.done)) return;   // guard: only when no pending งานย่อย
  s.tasks=s.tasks.filter(x=>x.id!==taskId); save(); render();
}
function deletePerson(name){
  let pending=0;
  state.sites.forEach(s=>s.tasks.forEach(t=>t.subtasks.forEach(st=>{ if(!st.done && (st.members||[]).includes(name)) pending++; })));
  if(pending>0) return;   // guard: only remove people with no pending work (like sites)
  state.people=state.people.filter(p=>p!==name);
  state.sites.forEach(s=>{   // strip from done assignments + materials so they don't linger
    s.tasks.forEach(t=>t.subtasks.forEach(st=>{ if(st.members) st.members=st.members.filter(m=>m!==name); }));
    (s.materials||[]).forEach(mt=>{ if(mt.members) mt.members=mt.members.filter(m=>m!==name); });
    if(s.members) s.members=s.members.filter(m=>m!==name);
  });
  save(); render();
}
function submitModal(){
  const f=state.form, m=state.modal;
  const fail = msg => { state.validationMsg=msg; render(); };
  if(m==='addSite'){
    if(!f.name.trim()) return fail('กรุณาระบุชื่อไซต์');
    const c=siteColors[state.sites.length%siteColors.length];
    state.sites.push({ id:uid(), name:f.name.trim(), color:c.color, colorBg:c.colorBg, members:[], tasks:[] });
    state.modal=null; state.page='sites';
  } else if(m==='addTask'){
    if(!f.siteId) return fail('กรุณาเลือกไซต์');
    if(!f.name.trim()) return fail('กรุณาระบุชื่อกลุ่มงาน');
    const s=state.sites.find(x=>x.id===f.siteId); s.tasks.push({ id:uid(), name:f.name.trim(), subtasks:[] });
    state.modal=null; state.page='sites'; state.expandedSites[f.siteId]=true;
  } else if(m==='addSubtask'){
    if(!f.siteId) return fail('กรุณาเลือกไซต์');
    if(!f.taskId && !f.newTaskName.trim()) return fail('กรุณาเลือกหรือสร้างกลุ่มงาน');
    if(!f.name.trim()) return fail('กรุณาระบุชื่องานย่อย');
    if(!f.deadline) return fail('กรุณาเลือกกำหนดส่ง');
    const sub={ id:uid(), name:f.name.trim(), deadline:f.deadline, members:[...f.memberIds], done:false };
    const s=state.sites.find(x=>x.id===f.siteId);
    if(!f.taskId && f.newTaskName.trim()) s.tasks.push({ id:uid(), name:f.newTaskName.trim(), subtasks:[sub] });
    else s.tasks.find(t=>t.id===f.taskId).subtasks.push(sub);
    state.modal=null; state.expandedSites[f.siteId]=true;
  } else if(m==='editTask'){
    if(!f.name.trim()) return fail('กรุณาระบุชื่องาน');
    if(!f.deadline) return fail('กรุณาเลือกกำหนดส่ง');
    const s=state.sites.find(x=>x.id===f.siteId);
    let st=null;   // pull the subtask out of its current group (preserves done/doneAt)
    s.tasks.forEach(t=>{ const found=t.subtasks.find(x=>x.id===f.editId); if(found){ st=found; t.subtasks=t.subtasks.filter(x=>x.id!==f.editId); } });
    if(!st) st={ id:f.editId, done:false };
    st.name=f.name.trim(); st.deadline=f.deadline; st.members=[...f.memberIds];
    let group;   // resolve target group (pick existing / create new / fallback ไม่ระบุ)
    if(f.newTaskName.trim()){ group={ id:uid(), name:f.newTaskName.trim(), subtasks:[] }; s.tasks.push(group); }
    else if(f.taskId){ group=s.tasks.find(t=>t.id===f.taskId); }
    if(!group){ group=s.tasks.find(t=>t.name==='ไม่ระบุ'); if(!group){ group={ id:uid(), name:'ไม่ระบุ', subtasks:[] }; s.tasks.push(group); } }
    group.subtasks.push(st);
    state.modal=null;
  } else if(m==='addMember'){
    if(!f.name.trim()) return fail('กรุณาระบุชื่อ');
    const nm=f.name.trim();
    if(!state.people.includes(nm)) state.people.push(nm);
    state.modal=null; state.page='persons';
  } else if(m==='addMaterial'){
    if(!f.siteId) return fail('กรุณาเลือกไซต์');
    if(!f.name.trim()) return fail('กรุณาระบุชื่อวัสดุ');
    if(!f.deadline) return fail('กรุณาเลือกกำหนดส่ง');
    const s=state.sites.find(x=>x.id===f.siteId);
    if(!s.materials) s.materials=[];
    s.materials.push({ id:uid(), name:f.name.trim(), qty:f.qty.trim(), unit:f.unit.trim(), deadline:f.deadline, members:[...f.memberIds], received:false });
    state.modal=null; state.page='materials';
  } else if(m==='editMaterial'){
    if(!f.siteId) return fail('กรุณาเลือกไซต์');
    if(!f.name.trim()) return fail('กรุณาระบุชื่อวัสดุ');
    if(!f.deadline) return fail('กรุณาเลือกกำหนดส่ง');
    let prev=null;  // pull out (preserve received state); allows moving to another site
    state.sites.forEach(s=>{ if(s.materials){ const found=s.materials.find(x=>x.id===f.editId); if(found) prev=found; s.materials=s.materials.filter(x=>x.id!==f.editId); } });
    const s=state.sites.find(x=>x.id===f.siteId);
    if(!s.materials) s.materials=[];
    s.materials.push({ id:f.editId, name:f.name.trim(), qty:f.qty.trim(), unit:f.unit.trim(), deadline:f.deadline, members:[...f.memberIds], received:prev?prev.received:false, receivedAt:prev?prev.receivedAt:undefined });
    state.modal=null;
  } else if(m==='editSite'){
    if(!f.name.trim()) return fail('กรุณาระบุชื่อไซต์');
    const s=state.sites.find(x=>x.id===f.siteId);
    if(s){ s.name=f.name.trim(); if(f.color){ s.color=f.color; s.colorBg=hexToRgba(f.color,0.13); } }
    state.modal=null;
  } else if(m==='addAll'){
    // unified form: create only what's filled; blanks → 'ไม่ระบุ'
    let site = null;
    if(f.newSiteName.trim()){
      const c=siteColors[state.sites.length%siteColors.length];
      site={ id:uid(), name:f.newSiteName.trim(), color:c.color, colorBg:c.colorBg, members:[], tasks:[], materials:[] };
      state.sites.push(site);
    } else if(f.siteId){
      site=state.sites.find(x=>x.id===f.siteId);
    }
    const newPerson=f.newPersonName.trim();
    const wantTask=!!f.name.trim();
    if(!site && wantTask){           // a task needs a site → bucket 'ไม่ระบุ'
      site=state.sites.find(x=>x.name==='ไม่ระบุ');
      if(!site){ const c=siteColors[state.sites.length%siteColors.length]; site={ id:uid(), name:'ไม่ระบุ', color:c.color, colorBg:c.colorBg, members:[], tasks:[], materials:[] }; state.sites.push(site); }
    }
    let did = !!f.newSiteName.trim();
    if(newPerson && !state.people.includes(newPerson)){ state.people.push(newPerson); did=true; }   // person → global roster
    if(wantTask){
      let members=[...f.memberIds]; if(newPerson && !members.includes(newPerson)) members.push(newPerson);
      let group;
      if(f.newTaskName.trim()){ group={ id:uid(), name:f.newTaskName.trim(), subtasks:[] }; site.tasks.push(group); }
      else if(f.taskId){ group=site.tasks.find(t=>t.id===f.taskId); }
      if(!group){ group=site.tasks.find(t=>t.name==='ไม่ระบุ'); if(!group){ group={ id:uid(), name:'ไม่ระบุ', subtasks:[] }; site.tasks.push(group); } }
      group.subtasks.push({ id:uid(), name:f.name.trim(), deadline:f.deadline||'', members:members.length?members:['ไม่ระบุ'], done:false });
      did=true;
    }
    if(!did) return fail('กรอกข้อมูลที่จะเพิ่มอย่างน้อย 1 อย่าง');
    if(site) state.expandedSites[site.id]=true;
    state.modal=null; state.page = wantTask ? 'dashboard' : (f.newSiteName.trim() ? 'sites' : 'persons');
  }
  save(); render();
}

// ── action dispatch ──
const actions = {
  goDashboard: ()=>{ state.page='dashboard'; render(); },
  goSites:     ()=>{ state.page='sites'; render(); },
  goPersons:   ()=>{ state.page='persons'; render(); },
  goMaterials: ()=>{ state.page='materials'; render(); },
  toggleFilterMenu: ()=>{ state.filterMenuOpen=!state.filterMenuOpen; state.fabOpen=false; render(); },
  closeFilterMenu:  ()=>{ state.filterMenuOpen=false; render(); },
  setFilter: el=>{ state.filter=el.dataset.filter; state.filterMenuOpen=false; render(); },
  toggleFab: ()=>{ state.fabOpen=!state.fabOpen; state.filterMenuOpen=false; render(); },
  closeFab:  ()=>{ state.fabOpen=false; render(); },
  markDone:   el=>markDone(el.dataset.id),
  editTask:   el=>openEditTask(el.dataset.id),
  toggleSite: el=>{ const id=el.dataset.id; state.expandedSites[id]=!state.expandedSites[id]; render(); },
  togglePerson: el=>{ const id=el.dataset.id; state.expandedPersons[id]=!state.expandedPersons[id]; render(); },
  addMember:  el=>openModal('addMember',{ siteId:el.dataset.site }),
  addTask:    el=>openModal('addTask',{ siteId:el.dataset.site }),
  addSubtask: el=>openModal('addSubtask',{ siteId:el.dataset.site, taskId:el.dataset.task }),
  deleteSite: el=>deleteSite(el.dataset.site),
  editSite:   el=>openEditSite(el.dataset.site),
  selectColor: el=>{ state.form.color=el.dataset.color; render(); },
  deleteSiteBtn: ()=>deleteSite(state.form.siteId),
  deleteGroup: el=>deleteGroup(el.dataset.site, el.dataset.task),
  deletePerson: el=>deletePerson(el.dataset.name),
  openAddSite:   ()=>openModal('addSite'),
  openAddTask:   ()=>openModal('addTask'),
  openAddSubtask:()=>openModal('addSubtask'),
  openAddMember: ()=>openModal('addMember'),
  openAddMaterial: ()=>openModal('addMaterial'),
  openAll:       ()=>openModal('addAll'),
  openChoose:    ()=>openModal('choose'),
  closeModal:    ()=>{ state.modal=null; state.validationMsg=''; render(); },
  goBackToChoose:()=>{ state.modal='choose'; state.validationMsg=''; render(); },
  submitModal,
  toggleFormMember: el=>{ const n=el.dataset.name; const ids=state.form.memberIds; const i=ids.indexOf(n); if(i>=0) ids.splice(i,1); else ids.push(n); render(); },
  toggleTaskPicker: ()=>{ state.form.taskPickerOpen=!state.form.taskPickerOpen; render(); },
  selectTaskGroup:  el=>{ state.form.taskId=el.dataset.id; state.form.newTaskName=''; state.form.taskPickerOpen=false; state.validationMsg=''; render(); },
  markDoneFromEdit: ()=>{ markDone(state.form.editId); state.modal=null; render(); },
  deleteSubtaskBtn: ()=>deleteSubtask(state.form.editId),
  markReceived: el=>markReceived(el.dataset.id),
  editMaterial: el=>openEditMaterial(el.dataset.id),
  markReceivedFromEdit: ()=>{ markReceived(state.form.editId); state.modal=null; render(); },
  deleteMaterialBtn: ()=>deleteMaterial(state.form.editId),
};

document.getElementById('app').addEventListener('click', e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  e.stopPropagation();
  const fn=actions[el.dataset.act]; if(fn) fn(el);
});
document.getElementById('app').addEventListener('input', e=>{
  const el=e.target.closest('[data-field]'); if(!el) return;
  const field=el.dataset.field;
  if(field==='siteId'){ state.form.siteId=el.value; state.form.taskId=''; state.form.newTaskName=''; state.form.taskPickerOpen=false; state.form.memberIds=[]; state.validationMsg=''; render(); return; }
  if(field==='newTaskName'){ state.form.newTaskName=el.value; state.form.taskId=''; state.validationMsg=''; return; } // no re-render: keep focus
  state.form[field]=el.value; state.validationMsg='';
});
// native color picker: re-render on close so swatch/preview reflect the pick (change fires once, not mid-drag)
document.getElementById('app').addEventListener('change', e=>{
  const el=e.target.closest('[data-field="color"]'); if(!el) return;
  state.form.color=el.value; render();
});

// ── render ──
function render(){
  const { page, sites, filter } = state;

  // flat lists for dashboard
  const allRaw=[], doneRaw=[];
  sites.forEach(site=>site.tasks.forEach(task=>task.subtasks.forEach(st=>{
    (st.done?doneRaw:allRaw).push({ ...st, site, task });
  })));
  allRaw.sort((a,b)=>a.deadline.localeCompare(b.deadline));
  doneRaw.sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));

  const pageTitle = page==='dashboard'?'ภาพรวมงาน':page==='sites'?'ไซต์ก่อสร้าง':page==='materials'?'วัสดุค้างส่ง':'รายบุคคล';
  const filterLabel = filter==='pending'?'งานที่เหลือ':filter==='done'?'งานที่เสร็จ':'ทั้งหมด';

  let main='';
  if(page==='dashboard') main=renderDashboard(allRaw, doneRaw);
  else if(page==='sites') main=renderSites();
  else if(page==='materials') main=renderMaterials();
  else main=renderPersons();

  document.getElementById('app').innerHTML = `
  <div style="min-height:100svh; background:#f8fafc; display:flex; flex-direction:column;">
    <header style="padding:18px 20px 14px; background:#f8fafc; border-bottom:1px solid #e5e7eb; position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between;">
      <div>
        <div style="font-size:10px; font-weight:700; letter-spacing:0.12em; color:#9ca3af; text-transform:uppercase; margin-bottom:3px;">ตารางติดตามงาน</div>
        <div style="font-size:22px; font-weight:700; color:#0f172a; line-height:1.1;">${esc(pageTitle)}</div>
      </div>
      <div style="position:relative;">
        <button data-act="toggleFilterMenu" style="background:#fff; border:1px solid #e2e8f0; border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; color:#374151; cursor:pointer; display:flex; align-items:center; gap:6px;">
          <span>${esc(filterLabel)}</span><span style="font-size:10px; color:#9ca3af;">▾</span>
        </button>
        ${state.filterMenuOpen?`
        <div data-act="closeFilterMenu" style="position:fixed; inset:0; z-index:14;"></div>
        <div style="position:absolute; top:calc(100% + 6px); right:0; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.1); z-index:15; overflow:hidden; min-width:140px;">
          ${filterBtn('pending','#f59e0b','งานที่เหลือ',false)}
          ${filterBtn('done','#22c55e','งานที่เสร็จ',true)}
          ${filterBtn('all','#6b7280','ทั้งหมด',true)}
        </div>`:''}
      </div>
    </header>

    <main style="flex:1; overflow-y:auto; padding:16px 16px 104px; max-width:680px; width:100%; margin:0 auto;">${main}</main>

    <button data-act="openChoose" style="position:fixed; bottom:90px; right:18px; width:52px; height:52px; border-radius:50%; background:#2563eb; border:none; cursor:pointer; color:#fff; font-size:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(37,99,235,0.2); z-index:31; font-weight:300;">+</button>

    ${renderModal()}

    <nav style="position:fixed; bottom:0; left:0; right:0; background:#f8fafc; border-top:1px solid #e5e7eb; display:flex; gap:6px; padding:10px 12px; padding-bottom:max(10px,env(safe-area-inset-bottom)); z-index:20;">
      ${navBtn('goDashboard','📋','ภาพรวม','dashboard')}
      ${navBtn('goMaterials','📦','วัสดุ','materials')}
      ${navBtn('goPersons','👷','รายบุคคล','persons')}
      ${navBtn('goSites','🏗️','ไซต์','sites')}

  </div>`;
}

function siteTag(name, bg, color, extra=''){
  return `<span style="font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:${bg}; color:${color}; white-space:nowrap; ${extra}">${esc(name)}</span>`;

// ── DASHBOARD ──
function renderDashboard(allRaw, doneRaw){
  const f=state.filter;
  const overdue  = allRaw.filter(i=>fmtDeadline(i.deadline).u==='overdue');
  const upcoming = allRaw.filter(i=>fmtDeadline(i.deadline).u!=='overdue');
  const noPending = f==='done' ? doneRaw.length===0 : allRaw.length===0;
  const hasOverdue  = f!=='done' && overdue.length>0;
  const hasUpcoming = f!=='done' && upcoming.length>0;
  const hasDone     = f!=='pending' && doneRaw.length>0;

  let html='';
  if(noPending && !hasDone){
    html += `<div style="text-align:center; padding:80px 20px; color:#9ca3af;"><div style="font-size:56px; margin-bottom:16px;">✅</div><div style="font-size:18px; font-weight:700; color:#6b7280;">งานเสร็จหมดแล้ว!</div><div style="font-size:14px; margin-top:6px;">ไม่มีงานค้างอยู่</div></div>`;
  }
  if(hasOverdue){
    html += `<div style="font-size:11px; font-weight:700; color:#ef4444; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; padding-left:4px;">⚠ เลยกำหนด</div>`;
    html += overdue.map(i=>dashCard(i,true)).join('');
    html += `<div style="height:6px;"></div>`;
  }
  if(hasUpcoming){
    if(hasOverdue) html += `<div style="font-size:11px; font-weight:700; color:#9ca3af; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; padding-left:4px;">งานที่ยังค้างอยู่</div>`;
    html += upcoming.map(i=>dashCard(i,false)).join('');
  }
  if(hasDone){
    html += `<div style="font-size:11px; font-weight:700; color:#22c55e; letter-spacing:0.08em; text-transform:uppercase; margin:16px 0 8px; padding-left:4px;">✓ เสร็จแล้ว</div>`;
    html += doneRaw.map(dashDoneCard).join('');
  }
  return html;
}
function dashCard(i, isOverdue){
  const dl=fmtDeadline(i.deadline);
  const members=i.members.join(', ')||'—';
  const border = isOverdue ? 'border:1px solid #fecaca; border-left:3px solid #ef4444;' : 'border:1px solid #e5e7eb;';
  const dlColor = isOverdue ? '#ef4444' : uColor(dl.u);
  return `<div class="card" data-act="editTask" data-id="${i.id}" style="background:#fff; ${border} border-radius:12px; padding:14px 16px; margin-bottom:9px; display:flex; gap:13px; align-items:flex-start; cursor:pointer;">
    <button data-act="markDone" data-id="${i.id}" title="ทำเสร็จแล้ว" style="width:24px; height:24px; border-radius:50%; border:2px solid ${isOverdue?'#fca5a5':'#d1d5db'}; background:transparent; cursor:pointer; flex-shrink:0; margin-top:2px;"></button>
    <div style="flex:1; min-width:0;">
      <div style="display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:5px;">
        ${siteTag(i.site.name, i.site.colorBg, i.site.color)}
        <span style="font-size:11px; color:#9ca3af;">${esc(i.task.name)}</span>
      </div>
      <div style="font-size:15px; font-weight:500; color:#374151; line-height:1.4; margin-bottom:7px;">${esc(i.name)}</div>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <span style="font-size:12px; font-weight:${isOverdue?700:600}; color:${dlColor};">${esc(dl.label)}</span>
        <span style="font-size:12px; color:#9ca3af;">${esc(members)}</span>
      </div>
    </div></div>`;
}
function dashDoneCard(i){
  const members=i.members.join(', ')||'—';
  const doneStr = i.doneAt?`เสร็จเมื่อ ${fmtDate(i.doneAt)}`:'เสร็จแล้ว';
  return `<div class="card" data-act="editTask" data-id="${i.id}" style="background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:13px 16px; margin-bottom:8px; display:flex; gap:13px; align-items:flex-start; cursor:pointer; opacity:0.75;">
    <div style="width:24px; height:24px; border-radius:50%; border:2px solid #86efac; background:rgba(34,197,94,0.1); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center;"><span style="font-size:12px; color:#22c55e; font-weight:700;">✓</span></div>
    <div style="flex:1; min-width:0;">
      <div style="display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:4px;">
        ${siteTag(i.site.name, i.site.colorBg, i.site.color, 'opacity:0.7;')}
        <span style="font-size:11px; color:#9ca3af;">${esc(i.task.name)}</span>
      </div>
      <div style="font-size:14px; font-weight:500; color:#9ca3af; line-height:1.4; margin-bottom:4px; text-decoration:line-through;">${esc(i.name)}</div>
      <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span style="font-size:11px; color:#22c55e; font-weight:600;">${esc(doneStr)}</span>
        <span style="font-size:11px; color:#d1d5db;">${esc(members)}</span>
      </div>
    </div></div>`;
}

// ── SITES ──
function renderSites(){
  const f=state.filter;
  let html = state.sites.map(site=>{
    const expanded=!!state.expandedSites[site.id];
    const totalPending=site.tasks.reduce((a,t)=>a+t.subtasks.filter(st=>!st.done).length,0);
    const groups = site.tasks.map(task=>{
      const pending=task.subtasks.filter(st=>!st.done).sort((a,b)=>a.deadline.localeCompare(b.deadline));
      const done = f==='pending'?[]:task.subtasks.filter(st=>st.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
      const rows = (f==='done'?done:[...pending,...done]);
      return { task, pendingCount:pending.length, noSubtasks:pending.length===0&&done.length===0, rows };
    }).filter(g=>g.rows.length>0 || g.pendingCount===0);

    let inner='';
    if(expanded){
      inner += groups.map(g=>`
        <div style="margin-bottom:18px;">
          <div style="display:flex; align-items:center; justify-content:space-between; padding-bottom:8px; border-bottom:1px solid #f0f2f5;">
            <div style="font-size:11px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#9ca3af;">${esc(g.task.name)}</div>
            <div style="display:flex; align-items:center; gap:2px; flex-shrink:0;">
              <button data-act="addSubtask" data-site="${site.id}" data-task="${g.task.id}" style="font-size:11px; font-weight:700; color:#3b82f6; background:transparent; border:none; cursor:pointer; padding:2px 6px;">+ งานย่อย</button>
              ${g.pendingCount===0?`<button data-act="deleteGroup" data-site="${site.id}" data-task="${g.task.id}" title="ลบกลุ่มงาน" style="font-size:12px; color:#f87171; background:transparent; border:none; cursor:pointer; padding:2px 6px;">🗑</button>`:''}
            </div>
          </div>
          ${g.rows.map(st=>siteSubRow(st)).join('')}
          ${g.noSubtasks?`<div style="font-size:13px; color:#9ca3af; padding:12px 0; text-align:center;">ยังไม่มีงานย่อย</div>`:''}
        </div>`).join('');

      inner += `<button data-act="addTask" data-site="${site.id}" style="width:100%; background:transparent; border:1px dashed #d1d5db; border-radius:8px; padding:10px; color:#9ca3af; font-size:13px; font-weight:600; cursor:pointer;">+ เพิ่มกลุ่มงาน</button>`;
    }

    const totalTasks=groups.reduce((a,g)=>a+g.pendingCount,0);
    const sitePeople=[...new Set(site.tasks.flatMap(t=>t.subtasks.flatMap(st=>st.members||[])).filter(m=>m&&m!=='ไม่ระบุ'))];
    return `<div style="background:#fff; border:1px solid #e5e7eb; border-radius:14px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div class="hov" data-act="toggleSite" data-id="${site.id}" style="padding:16px 18px; display:flex; align-items:center; gap:12px; cursor:pointer;">
        <div style="width:11px; height:11px; border-radius:50%; background:${site.color}; flex-shrink:0;"></div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:16px; font-weight:700; color:#111827; margin-bottom:2px;">${esc(site.name)}</div>
          <div style="font-size:11px; color:#9ca3af; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(sitePeople.length?sitePeople.join(' · '):'ยังไม่มีคนในงานนี้')}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
          <button data-act="editSite" data-site="${site.id}" title="แก้ไขไซต์" style="width:26px; height:26px; border-radius:50%; border:1px solid #e2e8f0; background:transparent; cursor:pointer; color:#6b7280; font-size:12px;">✏️</button>
          <span style="font-size:12px; font-weight:700; color:#6b7280; background:#f1f5f9; padding:3px 10px; border-radius:20px;">${totalTasks} งาน</span>
          <span style="font-size:20px; color:#9ca3af; font-weight:300;">${expanded?'▾':'›'}</span>
        </div>
      </div>
      ${expanded?`<div style="border-top:1px solid #f1f5f9; padding:14px 18px 10px;">${inner}</div>`:''}
    </div>`;
  }).join('');

  html += `<button data-act="openAddSite" style="width:100%; background:transparent; border:1px dashed #d1d5db; border-radius:14px; padding:18px; color:#9ca3af; font-size:14px; font-weight:600; cursor:pointer;">🏗️  + เพิ่มไซต์ก่อสร้างใหม่</button>`;
  return html;
}
function siteSubRow(st){
  const dl=fmtDeadline(st.deadline);
  const members=st.members.join(', ')||'—';
  const check = st.done
    ? `<div style="width:20px; height:20px; border-radius:50%; border:2px solid #86efac; background:rgba(34,197,94,0.1); flex-shrink:0; display:flex; align-items:center; justify-content:center;"><span style="font-size:10px; color:#22c55e; font-weight:700;">✓</span></div>`

// ── PERSONS ──
function renderPersons(){
  const f=state.filter;
  const map={};   // name -> assigned items across sites
  state.sites.forEach(site=>site.tasks.forEach(task=>task.subtasks.forEach(st=>{
    (st.members&&st.members.length?st.members:['ไม่ระบุ']).forEach(m=>{ (map[m]=map[m]||[]).push({ ...st, site, task }); });
  })));
  const names=[...new Set([...state.people, ...Object.keys(map)])];   // roster ∪ anyone assigned (e.g. 'ไม่ระบุ')
  if(!names.length) return `<div style="text-align:center; padding:80px 20px; color:#9ca3af;"><div style="font-size:56px; margin-bottom:16px;">👷</div><div style="font-size:18px; font-weight:700; color:#6b7280;">ยังไม่มีรายชื่อ</div><div style="font-size:14px; margin-top:6px;">กดปุ่ม + เพื่อเพิ่มคน</div></div>`;
  return names.map((name,idx)=>{
    const items=map[name]||[];
    const parts=name.split(' ');
    const initial=parts.length>1?parts[1].charAt(0):parts[0].charAt(0);
    const color=personPalette[idx%personPalette.length];
    const expanded=!!state.expandedPersons[name];
    const pending=items.filter(i=>!i.done).sort((a,b)=>a.deadline.localeCompare(b.deadline));
    const done=items.filter(i=>i.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
    const rows = f==='done'?done : f==='pending'?pending : [...pending,...done];
    const canDelete = pending.length===0 && name!=='ไม่ระบุ';
    return `<div style="background:#fff; border:1px solid #e5e7eb; border-radius:14px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div class="hov" data-act="togglePerson" data-id="${esc(name)}" style="padding:14px 18px; display:flex; align-items:center; gap:12px; cursor:pointer;">
        <div style="width:38px; height:38px; border-radius:50%; background:${color}; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; color:#080e1c; flex-shrink:0;">${esc(initial)}</div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:15px; font-weight:700; color:#111827; margin-bottom:1px;">${esc(name)}</div>
          <div style="font-size:11px; color:#9ca3af;">${pending.length?'งานที่รับผิดชอบ':'ว่าง — ไม่มีงานค้าง'}</div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
          ${canDelete?`<button data-act="deletePerson" data-name="${esc(name)}" title="ลบรายชื่อ" style="width:26px; height:26px; border-radius:50%; border:1px solid #fecaca; background:transparent; cursor:pointer; color:#f87171; font-size:13px;">🗑</button>`:''}
          <span style="font-size:12px; font-weight:700; color:#6b7280; background:#f1f5f9; padding:3px 10px; border-radius:20px;">${pending.length} งาน</span>
          <span style="font-size:20px; color:#9ca3af; font-weight:300;">${expanded?'▾':'›'}</span>
        </div>
      </div>
      ${expanded?`<div style="border-top:1px solid #f1f5f9; padding:4px 18px 12px;">${rows.length?rows.map(personRow).join(''):'<div style="font-size:13px; color:#9ca3af; padding:12px 0; text-align:center;">ไม่มีงานในตอนนี้</div>'}</div>`:''}
    </div>`;
  }).join('');
}

// ── MATERIALS (วัสดุค้างส่ง) ──
function renderMaterials(){
  const f=state.filter;
  const all=[];
  state.sites.forEach(site=>(site.materials||[]).forEach(mat=>all.push({ ...mat, site })));
  const pending=all.filter(m=>!m.received).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const received=all.filter(m=>m.received).sort((a,b)=>(b.receivedAt||0)-(a.receivedAt||0));
  const overdue=pending.filter(m=>fmtDeadline(m.deadline).u==='overdue');
  const upcoming=pending.filter(m=>fmtDeadline(m.deadline).u!=='overdue');
  const showPending=f!=='done', showReceived=f!=='pending';
  const nothing = f==='done'?received.length===0 : f==='pending'?pending.length===0 : all.length===0;
  if(nothing) return `<div style="text-align:center; padding:80px 20px; color:#9ca3af;"><div style="font-size:56px; margin-bottom:16px;">📦</div><div style="font-size:18px; font-weight:700; color:#6b7280;">ไม่มีวัสดุค้างส่ง</div><div style="font-size:14px; margin-top:6px;">กดปุ่ม + เพื่อเพิ่มวัสดุ</div></div>`;
  const sec=(label,color,top)=>`<div style="font-size:11px; font-weight:700; color:${color}; letter-spacing:0.08em; text-transform:uppercase; margin:${top} 0 8px; padding-left:4px;">${label}</div>`;
  let html='';
  if(showPending && overdue.length){ html+=sec('⚠ เลยกำหนด','#ef4444','0'); html+=overdue.map(m=>materialCard(m,true)).join(''); html+='<div style="height:6px;"></div>'; }
  if(showPending && upcoming.length){ if(overdue.length) html+=sec('รอส่งมอบ','#9ca3af','0'); html+=upcoming.map(m=>materialCard(m,false)).join(''); }
  if(showReceived && received.length){ html+=sec('✓ รับแล้ว','#22c55e','16px'); html+=received.map(materialReceivedCard).join(''); }
  return html;
}
function materialCard(m, isOverdue){
  const dl=fmtDeadline(m.deadline);
  const qtyStr=[m.qty,m.unit].filter(Boolean).join(' ');
  const border=isOverdue?'border:1px solid #fecaca; border-left:3px solid #ef4444;':'border:1px solid #e5e7eb;';
  const dlColor=isOverdue?'#ef4444':uColor(dl.u);
  return `<div class="card" data-act="editMaterial" data-id="${m.id}" style="background:#fff; ${border} border-radius:12px; padding:14px 16px; margin-bottom:9px; display:flex; gap:13px; align-items:flex-start; cursor:pointer;">
    <button data-act="markReceived" data-id="${m.id}" title="รับของแล้ว" style="width:24px; height:24px; border-radius:50%; border:2px solid ${isOverdue?'#fca5a5':'#d1d5db'}; background:transparent; cursor:pointer; flex-shrink:0; margin-top:2px;"></button>
    <div style="flex:1; min-width:0;">
      <div style="display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:5px;">${siteTag(m.site.name, m.site.colorBg, m.site.color)}</div>
      <div style="font-size:15px; font-weight:500; color:#374151; line-height:1.4; margin-bottom:7px;">${esc(m.name)}${qtyStr?` <span style="color:#6b7280; font-weight:400;">· ${esc(qtyStr)}</span>`:''}</div>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <span style="font-size:12px; font-weight:${isOverdue?700:600}; color:${dlColor};">${esc(dl.label)}</span>
        ${m.members&&m.members.length?`<span style="font-size:12px; color:#9ca3af;">${esc(m.members.join(', '))}</span>`:''}
      </div>
    </div></div>`;
}
function materialReceivedCard(m){
  const qtyStr=[m.qty,m.unit].filter(Boolean).join(' ');

    <div style="width:24px; height:24px; border-radius:50%; border:2px solid #86efac; background:rgba(34,197,94,0.1); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center;"><span style="font-size:12px; color:#22c55e; font-weight:700;">✓</span></div>
    <div style="flex:1; min-width:0;">
      <div style="display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:4px;">${siteTag(m.site.name, m.site.colorBg, m.site.color, 'opacity:0.7;')}</div>
      <div style="font-size:14px; font-weight:500; color:#9ca3af; line-height:1.4; margin-bottom:4px; text-decoration:line-through;">${esc(m.name)}${qtyStr?` · ${esc(qtyStr)}`:''}</div>

}

  const site=state.sites.find(x=>x.id===f.siteId)||{};
  const pending=site.tasks?site.tasks.reduce((a,t)=>a+t.subtasks.filter(st=>!st.done).length,0):0;
  const swatch=c=>`<button data-act="selectColor" data-color="${c.color}" title="${c.color}" style="width:34px; height:34px; border-radius:50%; background:${c.color}; border:3px solid ${f.color===c.color?'#111827':'#e5e7eb'}; cursor:pointer; flex-shrink:0;"></button>`;
  let html=`<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <div style="font-size:18px; font-weight:700; color:#111827;">แก้ไขไซต์</div>
      <button data-act="closeModal" style="width:32px; height:32px; border-radius:50%; border:1px solid #e2e8f0; background:transparent; cursor:pointer; color:#6b7280; font-size:18px;">✕</button>
    </div>
    <div style="margin-bottom:16px;"><label style="${labelStyle}">ชื่อไซต์</label><input data-field="name" value="${esc(f.name)}" style="${inputStyle}"></div>
    <div style="margin-bottom:20px;"><label style="${labelStyle}">สี</label>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        ${siteColors.map(swatch).join('')}
        <label title="เลือกสีเอง" style="width:34px; height:34px; border-radius:50%; border:2px dashed #cbd5e1; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; flex-shrink:0;"><span style="font-size:15px;">🎨</span><input type="color" data-field="color" value="${esc(f.color||'#2563eb')}" style="position:absolute; inset:0; opacity:0; cursor:pointer;"></label>
      </div>
      <div style="font-size:12px; color:#9ca3af; margin-top:10px; display:flex; align-items:center; gap:7px;">สีที่เลือก <span style="width:18px; height:18px; border-radius:50%; background:${esc(f.color||'#2563eb')}; display:inline-block; border:1px solid #e5e7eb;"></span> ${esc(f.color||'')}</div>
    </div>
    ${valHint()}
    <button data-act="submitModal" class="btnblue" style="width:100%; background:#2563eb; color:#fff; border:none; border-radius:11px; padding:14px; font-size:16px; font-weight:700; cursor:pointer;">บันทึก</button>
    <div style="height:1px; background:#f1f5f9; margin:10px 0;"></div>`;
  if(pending===0) html+=`<button data-act="deleteSiteBtn" style="width:100%; background:transparent; color:#f87171; border:1px solid #fecaca; border-radius:11px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;"><span>🗑</span><span>ลบไซต์นี้</span></button>`;
  else html+=`<div style="font-size:12px; color:#9ca3af; text-align:center; padding:6px;">ลบไม่ได้ — ยังมีงานค้าง ${pending} งาน (ทำให้เสร็จก่อน)</div>`;
  return html;
}
function groupPicker(){   // pick existing group / create new — shared by edit-งาน and add-งานย่อย
  const f=state.form;
  const site=state.sites.find(s=>s.id===f.siteId);
  const opts=site?site.tasks:[];
  const dispLabel=f.taskId?((opts.find(o=>o.id===f.taskId)||{}).name||''):(f.newTaskName||'เลือกหรือสร้างกลุ่มงาน');
  const valColor=(f.taskId||f.newTaskName)?'#111827':'#9ca3af';
  return `<div data-act="toggleTaskPicker" style="background:#f9fafb; border:1px solid #e2e8f0; border-radius:${f.taskPickerOpen?'8px 8px 0 0':'8px'}; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
      <span style="font-size:15px; color:${valColor};">${esc(dispLabel)}</span><span style="color:#6b7280; font-size:18px;">${f.taskPickerOpen?'▾':'›'}</span>
    </div>
    ${f.taskPickerOpen?`<div style="background:#f9fafb; border:1px solid #e2e8f0; border-top:none; border-radius:0 0 8px 8px;">
      ${opts.map(opt=>{ const sel=f.taskId===opt.id; return `<div data-act="selectTaskGroup" data-id="${opt.id}" style="padding:11px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border-bottom:1px solid #f0f2f5;"><div style="width:16px; height:16px; border-radius:50%; border:2px solid ${sel?'#2563eb':'#d1d5db'}; display:flex; align-items:center; justify-content:center;">${sel?'<div style="width:7px; height:7px; border-radius:50%; background:#3b82f6;"></div>':''}</div><span style="font-size:14px; color:${sel?'#111827':'#6b7280'};">${esc(opt.name)}</span></div>`; }).join('')}
      ${opts.length===0?`<div style="padding:10px 14px; font-size:13px; color:#9ca3af; border-bottom:1px solid #f0f2f5;">ยังไม่มีกลุ่มงานในไซต์นี้</div>`:''}
      <div style="padding:10px 14px;"><input data-field="newTaskName" value="${esc(f.newTaskName)}" placeholder="+ พิมพ์ชื่อกลุ่มงานใหม่..." style="background:transparent; border:none; padding:2px 0; color:#111827; font-size:14px; width:100%; outline:none;"></div>
    </div>`:''}`;
}
function modalEdit(){
  const f=state.form;
  const s=state.sites.find(x=>x.id===f.siteId)||{};
  return `<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <div style="font-size:18px; font-weight:700; color:#111827;">แก้ไขงาน</div>
      <button data-act="closeModal" style="width:32px; height:32px; border-radius:50%; border:1px solid #e2e8f0; background:transparent; cursor:pointer; color:#6b7280; font-size:18px;">✕</button>
    </div>
    <div style="margin-bottom:16px;">${siteTag(s.name||'', s.colorBg||'rgba(107,114,128,0.1)', s.color||'#6b7280')}</div>
    <div style="margin-bottom:16px;"><label style="${labelStyle}">กลุ่มงาน</label>${groupPicker()}</div>
    <div style="margin-bottom:16px;"><label style="${labelStyle}">ชื่องาน</label><input data-field="name" value="${esc(f.name)}" style="${inputStyle}"></div>
    <div style="margin-bottom:16px;"><label style="${labelStyle}">กำหนดส่ง</label><input type="date" data-field="deadline" value="${esc(f.deadline)}" style="${inputStyle} color-scheme:light;"></div>
    <div style="margin-bottom:20px;"><label style="${labelStyle}">ผู้รับผิดชอบ</label>${memberChips()}</div>
    ${valHint()}
    <button data-act="submitModal" class="btnblue" style="width:100%; background:#2563eb; color:#fff; border:none; border-radius:11px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; margin-bottom:10px;">บันทึก</button>
    <div style="height:1px; background:#f1f5f9; margin:2px 0 10px;"></div>
    <button data-act="markDoneFromEdit" style="width:100%; background:transparent; color:#6b7280; border:1px solid #e2e8f0; border-radius:11px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;"><span>✓</span><span>เสร็จงานแล้ว</span></button>
    <div style="height:1px; background:#f1f5f9; margin:6px 0;"></div>
    <button data-act="deleteSubtaskBtn" style="width:100%; background:transparent; color:#f87171; border:1px solid #fecaca; border-radius:11px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;"><span>🗑</span><span>ลบงานนี้</span></button>`;
}
function modalForm(){
  const m=state.modal, f=state.form;
  const titles={ addSite:'เพิ่มไซต์ใหม่', addTask:'เพิ่มกลุ่มงาน', addSubtask:'เพิ่มงานย่อย', addMember:'เพิ่มสมาชิก' };
  const nameLbl={ addSite:'ชื่อไซต์ก่อสร้าง', addTask:'ชื่อกลุ่มงาน', addSubtask:'ชื่องานย่อย', addMember:'ชื่อ-นามสกุล สมาชิก' };
  const namePH={ addSite:'เช่น โครงการ The River Phase 2', addTask:'เช่น งานโครงสร้าง', addSubtask:'เช่น เทพื้น ชั้น 5', addMember:'เช่น นายสมชาย ใจดี' };
  const needsSite = m==='addTask'||m==='addSubtask';
  const selectedSite=state.sites.find(s=>s.id===f.siteId);
  const taskOptions=selectedSite?selectedSite.tasks:[];

  let html=`<div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
      <button data-act="goBackToChoose" style="width:32px; height:32px; border-radius:50%; border:1px solid #e2e8f0; background:transparent; cursor:pointer; color:#6b7280; font-size:16px;">‹</button>
      <div style="font-size:18px; font-weight:700; color:#111827;">${esc(titles[m]||'')}</div>
    </div>`;

  if(needsSite){
    html+=`<div style="margin-bottom:16px;"><label style="${labelStyle}">ไซต์ก่อสร้าง</label>
      <select data-field="siteId" style="${inputStyle}">
        <option value="">-- เลือกไซต์ --</option>
        ${state.sites.map(s=>`<option value="${s.id}" ${s.id===f.siteId?'selected':''}>${esc(s.name)}</option>`).join('')}
      </select></div>`;
  }

  if(m==='addSubtask'){
    const dispLabel = f.taskId ? ((taskOptions.find(o=>o.id===f.taskId)||{}).name||'') : (f.newTaskName||'เลือกหรือสร้างกลุ่มงาน');
    const valColor = (f.taskId||f.newTaskName)?'#111827':'#9ca3af';
    html+=`<div style="margin-bottom:16px;"><label style="${labelStyle}">กลุ่มงาน</label>
      <div data-act="toggleTaskPicker" style="background:#f9fafb; border:1px solid #e2e8f0; border-radius:${f.taskPickerOpen?'8px 8px 0 0':'8px'}; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;">
        <span style="font-size:15px; color:${valColor};">${esc(dispLabel)}</span><span style="color:#6b7280; font-size:18px;">${f.taskPickerOpen?'▾':'›'}</span>
      </div>
      ${f.taskPickerOpen?`<div style="background:#f9fafb; border:1px solid #e2e8f0; border-top:none; border-radius:0 0 8px 8px;">
        ${taskOptions.map(opt=>{ const sel=f.taskId===opt.id; return `<div data-act="selectTaskGroup" data-id="${opt.id}" style="padding:11px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; border-bottom:1px solid #f0f2f5;"><div style="width:16px; height:16px; border-radius:50%; border:2px solid ${sel?'#2563eb':'#d1d5db'}; display:flex; align-items:center; justify-content:center;">${sel?'<div style="width:7px; height:7px; border-radius:50%; background:#3b82f6;"></div>':''}</div><span style="font-size:14px; color:${sel?'#111827':'#6b7280'};">${esc(opt.name)}</span></div>`; }).join('')}
        ${f.siteId&&taskOptions.length===0?`<div style="padding:10px 14px; font-size:13px; color:#9ca3af; border-bottom:1px solid #f0f2f5;">ยังไม่มีกลุ่มงานในไซต์นี้</div>`:''}
        <div style="padding:10px 14px;"><input data-field="newTaskName" value="${esc(f.newTaskName)}" placeholder="+ พิมพ์ชื่อกลุ่มงานใหม่..." style="background:transparent; border:none; padding:2px 0; color:#111827; font-size:14px; width:100%; outline:none;"></div>
      </div>`:''}
    </div>`;
  }

  html+=`<div style="margin-bottom:16px;"><label style="${labelStyle}">${esc(nameLbl[m]||'ชื่อ')}</label><input data-field="name" value="${esc(f.name)}" placeholder="${esc(namePH[m]||'')}" style="${inputStyle}"></div>`;

  if(m==='addSubtask'){
    html+=`<div style="margin-bottom:16px;"><label style="${labelStyle}">กำหนดส่ง</label><input type="date" data-field="deadline" value="${esc(f.deadline)}" style="${inputStyle} color-scheme:light;"></div>`;
    html+=`<div style="margin-bottom:16px;"><label style="${labelStyle}">ผู้รับผิดชอบ</label>${memberChips()}</div>`;
  }

  html+=valHint();
  html+=`<button data-act="submitModal" class="btnblue" style="width:100%; background:#2563eb; color:#fff; border:none; border-radius:11px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; margin-top:4px;">บันทึก</button>`;
  return html;
}

boot();
</script>
</body>
</html>
